name: snapconnect
description: "Cross-platform photo album companion app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.3.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Image handling
  cached_network_image: ^3.3.1
  image_picker: ^1.1.1
  photo_view: ^0.14.0
  flutter_staggered_grid_view: ^0.7.0
  file_picker: ^8.0.5

  # HTTP / API
  http: ^1.2.1
  dio: ^5.4.3

  # Storage / session
  shared_preferences: ^2.2.3

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # File download
  path_provider: ^2.1.3
  permission_handler: ^11.3.0

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # UI helpers
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  fluttertoast: ^8.2.4
  gap: ^3.0.1

  # Environment variables
  flutter_dotenv: ^5.1.0

  # ZIP download
  archive: ^3.4.10

  # Date formatting
  timeago: ^3.6.1
  intl: ^0.19.0

  # Utilities
  uuid: ^4.5.1
  universal_io: ^2.2.2
  share_plus: ^10.0.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
